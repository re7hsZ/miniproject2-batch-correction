name: scrna_batch
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.10,<3.14
  - pip
  - r-base=4.3.*
  - r-seurat=5.*
  - r-seuratobject
  - r-matrix
  - r-dplyr
  - pip:
      - scanpy>=1.10
      - anndata>=0.10
      - scvi-tools>=1.1
      - harmony-pytorch>=0.1.7
      - scanorama>=1.7
      - matplotlib>=3.7
      - seaborn>=0.12
      - scikit-learn>=1.3
      - umap-learn>=0.5
      - leidenalg>=0.10
      - igraph>=0.10
      - pandas>=2.0
      - numpy>=1.24
      - scipy>=1.11
